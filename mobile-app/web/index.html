<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0f0f13" />
    <title>KLIN UP — Aperçu Mobile</title>
    <style>
      /* Modern and discreet custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px !important;
        height: 6px !important;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.02) !important;
        border-radius: 10px !important;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1 !important;
        border-radius: 10px !important;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8 !important;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        scrollbar-width: thin !important;
        scrollbar-color: #cbd5e1 transparent !important;
        -webkit-tap-highlight-color: transparent !important;
        -webkit-touch-callout: none;
        outline: none !important;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #1b1b22 0%, #09090b 100%);
        overflow: hidden;
      }

      /* ─── Fond principal ─── */
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      /* ─── Label aperçu ─── */
      .preview-label {
        color: rgba(255, 255, 255, 0.85);
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 6px 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        flex-shrink: 0;
      }

      /* ─── Cadre téléphone ─── */
      .phone-frame {
        position: relative;
        width: 393px;
        height: 852px;
        border-radius: 0px;
        background: #151518;
        box-shadow:
          inset 0 0 0 2px rgba(255,255,255,0.16),
          0 0 0 4px #09090b,
          0 0 0 6px #2e2e33,
          0 0 0 8px #09090b,
          0 40px 90px rgba(0,0,0,0.85);
        flex-shrink: 0;
        overflow: hidden;

        /* Responsive scale */
        transform-origin: center center;
      }

      /* ─── Boutons physiques ─── */
      .btn-right {
        position: absolute; right: -4px; top: 180px;
        width: 4px; height: 88px;
        background: #2e2e33; border-radius: 0 3px 3px 0;
      }
      .btn-left-1 {
        position: absolute; left: -4px; top: 130px;
        width: 4px; height: 32px;
        background: #2e2e33; border-radius: 3px 0 0 3px;
      }
      .btn-left-2 {
        position: absolute; left: -4px; top: 180px;
        width: 4px; height: 64px;
        background: #2e2e33; border-radius: 3px 0 0 3px;
      }
      .btn-left-3 {
        position: absolute; left: -4px; top: 258px;
        width: 4px; height: 64px;
        background: #2e2e33; border-radius: 3px 0 0 3px;
      }

      /* ─── Écran ─── */
      .phone-screen {
        position: absolute;
        inset: 10px;
        border-radius: 0px;
        overflow: hidden;
        background: #fff;
        display: flex;
        flex-direction: column;
      }

      /* ─── Dynamic Island ─── */
      .dynamic-island {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        height: 30px;
        background: #09090b;
        border-radius: 20px;
        z-index: 500;
        pointer-events: none;
      }

      /* ─── Status bar ─── */
      .status-bar {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 52px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        padding: 0 24px 8px;
        z-index: 400;
        pointer-events: none;
        background: transparent;
      }
      .sb-time {
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #000;
      }
      .sb-icons {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ─── L'app React Native ─── */
      #root {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        overflow: hidden !important;
        padding-top: 0;
      }

      /* Override RN Web AppContainer which uses position:absolute inset:0 */
      #root > div:first-child {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100% !important;
        height: 100% !important;
        overflow: hidden !important;
      }

      /* ─── Reflet écran ─── */
      .screen-glare {
        position: absolute;
        inset: 10px;
        border-radius: 0px;
        background: linear-gradient(
          135deg,
          rgba(255,255,255,0.08) 0%,
          rgba(255,255,255,0.01) 25%,
          transparent 55%
        );
        pointer-events: none;
        z-index: 600;
      }
    </style>
  </head>
  <body>
    <div class="preview-label">📱 KLIN UP — Aperçu Mobile</div>

    <div class="phone-frame" id="phoneFrame">
      <!-- Boutons physiques -->
      <div class="btn-right"></div>
      <div class="btn-left-1"></div>
      <div class="btn-left-2"></div>
      <div class="btn-left-3"></div>

      <div class="phone-screen">
        <!-- Dynamic Island -->
        <div class="dynamic-island"></div>

        <!-- Status bar simulée -->
        <div class="status-bar">
          <span class="sb-time" id="sb-time">--:--</span>
          <div class="sb-icons">
            <!-- Signal -->
            <svg width="17" height="12" viewBox="0 0 17 12" fill="#000">
              <rect x="0" y="8" width="3" height="4" rx="0.8" opacity="0.3"/>
              <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.8" opacity="0.5"/>
              <rect x="9" y="3" width="3" height="9" rx="0.8" opacity="0.75"/>
              <rect x="13.5" y="0" width="3" height="12" rx="0.8"/>
            </svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <circle cx="8" cy="10.5" r="1.5" fill="#000"/>
              <path d="M4.5 7.5a5 5 0 0 1 7 0" stroke="#000" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
              <path d="M1.5 5a9 9 0 0 1 13 0" stroke="#000" stroke-width="1.4" stroke-linecap="round" opacity="0.35"/>
            </svg>
            <!-- Batterie -->
            <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
              <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#000" stroke-opacity="0.35"/>
              <rect x="2" y="2" width="17" height="9" rx="2" fill="#000"/>
              <path d="M23.5 4.5v4a2.5 2.5 0 0 0 0-4z" fill="#000" opacity="0.4"/>
            </svg>
          </div>
        </div>

        <!-- React Native App -->
        <div id="root"></div>
      </div>

      <!-- Reflet -->
      <div class="screen-glare"></div>
    </div>

    <script>
      // ── Live clock ──
      function tick() {
        const d = new Date();
        const t = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        document.getElementById('sb-time').textContent = t;
      }
      tick();
      setInterval(tick, 5000);

      // ── Responsive scale: fit phone frame to available viewport ──
      function scaleFrame() {
        const frame = document.getElementById('phoneFrame');
        if (!frame) return;
        const PHONE_W = 393;
        const PHONE_H = 852;
        const LABEL_H = 48; // label + gap
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const availW = vw - 32;
        const availH = vh - LABEL_H - 32;
        const scaleX = availW / PHONE_W;
        const scaleY = availH / PHONE_H;
        const scale = Math.min(scaleX, scaleY, 1); // never scale UP beyond 1
        frame.style.transform = scale < 1 ? `scale(${scale.toFixed(3)})` : '';
      }
      scaleFrame();
      window.addEventListener('resize', scaleFrame);
    </script>
  </body>
</html>
