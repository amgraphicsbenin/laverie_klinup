<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <title>KLIN UP — Aperçu Mobile</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #0f0f13;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
      }

      /* Label en haut */
      .preview-label {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.5);
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 9999;
        pointer-events: none;
        white-space: nowrap;
      }

      /* Cadre téléphone */
      .phone-frame {
        position: relative;
        width: 393px;
        height: 852px;
        border-radius: 50px;
        background: #1a1a1e;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.12),
          0 0 0 3px #2a2a2e,
          0 0 0 4px rgba(255,255,255,0.06),
          0 40px 80px rgba(0,0,0,0.8),
          inset 0 0 0 1px rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Écran intérieur */
      .phone-screen {
        position: relative;
        width: 361px;
        height: 820px;
        border-radius: 42px;
        overflow: hidden;
        background: #ffffff;
        display: flex;
        flex-direction: column;
      }

      /* Barre de statut (simulée) */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 44px;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px 0;
        background: rgba(255,255,255,0.0);
        pointer-events: none;
      }

      .status-bar-time {
        font-size: 15px;
        font-weight: 600;
        color: #000;
        letter-spacing: -0.3px;
      }

      .status-bar-icons {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .status-bar-icons svg {
        fill: #000;
      }

      /* Notch dynamique island */
      .dynamic-island {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 34px;
        background: #0f0f13;
        border-radius: 20px;
        z-index: 200;
        pointer-events: none;
      }

      /* Container de l'app React Native */
      #root {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
      }

      /* Bouton latéral droit */
      .phone-button-right {
        position: absolute;
        right: -4px;
        top: 160px;
        width: 4px;
        height: 80px;
        background: #2a2a2e;
        border-radius: 0 3px 3px 0;
        box-shadow: 1px 0 0 rgba(255,255,255,0.08);
      }

      /* Boutons gauches (volume) */
      .phone-button-left-1 {
        position: absolute;
        left: -4px;
        top: 120px;
        width: 4px;
        height: 36px;
        background: #2a2a2e;
        border-radius: 3px 0 0 3px;
        box-shadow: -1px 0 0 rgba(255,255,255,0.08);
      }
      .phone-button-left-2 {
        position: absolute;
        left: -4px;
        top: 170px;
        width: 4px;
        height: 60px;
        background: #2a2a2e;
        border-radius: 3px 0 0 3px;
        box-shadow: -1px 0 0 rgba(255,255,255,0.08);
      }
      .phone-button-left-3 {
        position: absolute;
        left: -4px;
        top: 244px;
        width: 4px;
        height: 60px;
        background: #2a2a2e;
        border-radius: 3px 0 0 3px;
        box-shadow: -1px 0 0 rgba(255,255,255,0.08);
      }

      /* Reflet sur l'écran */
      .screen-glare {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 40%;
        background: linear-gradient(
          170deg,
          rgba(255,255,255,0.04) 0%,
          transparent 60%
        );
        border-radius: 42px 42px 0 0;
        pointer-events: none;
        z-index: 300;
      }

      /* Responsive : sur petit écran, réduire */
      @media (max-height: 900px) {
        .phone-frame {
          transform: scale(0.88);
          transform-origin: center center;
        }
      }
      @media (max-height: 780px) {
        .phone-frame {
          transform: scale(0.75);
        }
      }
    </style>
  </head>
  <body>
    <div class="preview-label">📱 Aperçu KLIN UP — Vue Mobile</div>

    <div class="phone-frame">
      <!-- Boutons physiques simulés -->
      <div class="phone-button-right"></div>
      <div class="phone-button-left-1"></div>
      <div class="phone-button-left-2"></div>
      <div class="phone-button-left-3"></div>

      <div class="phone-screen">
        <!-- Dynamic Island -->
        <div class="dynamic-island"></div>

        <!-- Barre de statut simulée -->
        <div class="status-bar">
          <span class="status-bar-time" id="status-time">12:00</span>
          <div class="status-bar-icons">
            <!-- Antenne réseau -->
            <svg width="17" height="12" viewBox="0 0 17 12">
              <rect x="0" y="7" width="3" height="5" rx="1" opacity="0.4"/>
              <rect x="4.5" y="4.5" width="3" height="7.5" rx="1" opacity="0.6"/>
              <rect x="9" y="2" width="3" height="10" rx="1" opacity="0.8"/>
              <rect x="13.5" y="0" width="3" height="12" rx="1"/>
            </svg>
            <!-- Wifi -->
            <svg width="16" height="12" viewBox="0 0 16 12">
              <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
              <path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
              <path d="M1 4a10 10 0 0 1 14 0" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
            </svg>
            <!-- Batterie -->
            <svg width="25" height="12" viewBox="0 0 25 12">
              <rect x="0" y="1" width="21" height="10" rx="3" stroke="#000" stroke-width="1.2" fill="none"/>
              <rect x="1.5" y="2.5" width="14" height="7" rx="2" fill="#000"/>
              <path d="M22 4v4a2 2 0 0 0 0-4z" fill="#000" opacity="0.4"/>
            </svg>
          </div>
        </div>

        <!-- App React Native -->
        <div id="root"></div>

        <!-- Reflet écran -->
        <div class="screen-glare"></div>
      </div>
    </div>

    <script>
      // Afficher l'heure en temps réel
      function updateTime() {
        const now = new Date();
        const h = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const el = document.getElementById('status-time');
        if (el) el.textContent = h + ':' + m;
      }
      updateTime();
      setInterval(updateTime, 10000);
    </script>
  </body>
</html>
