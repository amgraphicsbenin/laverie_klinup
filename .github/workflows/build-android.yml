name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Configure Versioning & Build Artifact Name
        working-directory: mobile-app
        run: |
          VERSION_NAME=$(node -p "require('./app.json').expo.version")
          BUILD_NUMBER=${{ github.run_number }}
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "APK_NAME=klinup-v${VERSION_NAME}-build${BUILD_NUMBER}" >> $GITHUB_ENV
          
          echo "Building KLIN UP Mobile v${VERSION_NAME} (Build #${BUILD_NUMBER})"
          
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('./app.json', 'utf8'));
            app.expo.android = app.expo.android || {};
            app.expo.android.versionCode = ${BUILD_NUMBER};
            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2));
          "

      - name: Install dependencies
        working-directory: mobile-app
        run: npm ci

      - name: Expo prebuild (generate Android native layer)
        working-directory: mobile-app
        run: npx expo prebuild --platform android --no-install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages & build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile-app/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create Android assets directory
        run: mkdir -p mobile-app/android/app/src/main/assets

      - name: Bundle JavaScript (standalone — no Metro required)
        working-directory: mobile-app
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Make Gradle wrapper executable
        run: chmod +x mobile-app/android/gradlew

      - name: Build Release APK with Gradle Caching & Parallel Execution
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon --build-cache --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
